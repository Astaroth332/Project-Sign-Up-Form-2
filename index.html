<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="left-section">
        <div class="logo-container">
            <div class="logo"><img src="images/odin-lined.png" alt="Odin logo"></div>
            <div class="logo-text">ODIN</div>
        </div>
       <div class="credit-container">
        <div class="photo-owner">Photo by <a href="">Natan Dumlao</a> on <a href="">Unplash</a></div>
       </div>
    </div>
    <div class="right-section">
        <div class="sign-up-description">
            <div class="first-descrip">This is not a real online service! You know you need something 
                <div>like this in your life to help you realize your deepest dreams.</div> 
                <div>Sign up <i>now </i>to get started.</div>
                </div>
            <div class="second-descript">You <i> know </i>you want to.</div>
        </div>
        <div class="sign-up-container">
            <div class="sign-up">
                <div class="signup-title"> Let's do this!</div>
                <form action="" id="create-account">
                    <div class="row-form-control">
                        <div>
                            <label for="fname">FIRST NAME</label>
                            <input type="text" id="fname" name="fname" maxlength="245" required ="^[a-zA-Z ]+$" >
                        </div>
                        <div>
                            <label for="lname">LAST NAME</label
                            ><input type="text" id="lname" name="lname" required pattern="^[a-zA-Z ]+$">
                        </div>
                    </div>
                    <div class="row-form-control">
                        <div>
                            <label for="email">EMAIL</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div>
                            <label for="phoneNumber">PHONE NUMBER</label>
                            <input type="tel" id="phoneNumber" name="phoneNumber" required>
                        </div>
                    </div>
                    <div class="row-form-control">
                        <div>
                            <label for="password">PASSWORD</label>
                            <input type="password" id="password" name="password" required minlength="">
                            <p id="result-message"></p>
                        </div>
                        <div>
                            <label for="confirmPassword">CONFIRM PASSWORD</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                        </div>
                    </div> 
                </form>
            </div>
            <div class="submit-button"><button type="submit" onclick="checkPassword()" form="create-account">Create account</button></div>
            <div class="user-status-account">Already have an account? <a href=""> Log in</a></div> 
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
