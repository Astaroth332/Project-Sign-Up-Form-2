<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="left-section">
        <div class="logo-container">
            <div class="logo"><img src="images/odin-lined.png" alt="Odin logo"></div>
            <div class="logo-text">ODIN</div>
        </div>
       <div class="credit-container">
        <div class="photo-owner">Photo by <a href="">Natan Dumlao</a> on <a href="">Unplash</a></div>
       </div>
    </div>
    <div class="right-section">
        <div class="sign-up-description">
            <div class="first-descrip">This is not a real online service! You know you need something 
                <div>like this in your life to help you realize your deepest dreams.</div> 
                <div>Sign up <i>now </i>to get started.</div>
                </div>
            <div class="second-descript">You <i> know </i>you want to.</div>
        </div>
        <div class="sign-up-container">
            <div class="sign-up">
                <div class="signup-title"> Let's do this!</div>
                <div class="row-form-control">
                    <div><label for="fname">FIRST NAME</label>
                        <input type="text" id="fname">
                    </div>
                    <div><label for="lname">LAST NAME</label
                        ><input type="text" id="lname">
                    </div>
                </div>
                <div class="row-form-control">
                    <div><label for="email">EMAIL</label>
                        <input type="email" id="email">
                    </div>
                    <div><label for="phoneNumber">PHONE NUMBER</label>
                        <input type="text" id="phoneNumber">
                    </div>
                </div>
                <div class="row-form-control" >
                    <div><label for="password">PASSWORD</label>
                        <input type="text" id="password">
                    </div>
                    <div><label for="confirmPassword">CONFIRM PASSWORD</label>
                        <input type="text" id="confirmPassword">
                    </div>
                </div>
            </div>
            <div class="create-btn">
                <button>Create Account</button>
            </div>
            <div class="accsount-exist-link-container">
                Already have an account? <a href="">Log in</a>
            </div>
        </div>
    </div>
</body>
</html>
